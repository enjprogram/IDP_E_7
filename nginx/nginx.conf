events {
    worker_connections 1024;
}

http {

    # -- Streamlit ---------------------------------------------------------
    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass         http://frontend:8501;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";  # WebSocket for Streamlit
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 86400;                 # keep connection alive
        }
    }

    # -- FastAPI ----------------------------------------------------
    server {
        listen 8000;
        server_name localhost;

        location / {
            proxy_pass       http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # -- MLflow — password protected ---------------------
    server {
        listen 5000;
        server_name localhost;

        location / {
            auth_basic           "MLflow";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass       http://mlflow:5000;
            proxy_set_header Host mlflow;             # fixes DNS rebinding
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # -- TensorBoard ------------------------------------------------
    server {
        listen 6006;
        server_name localhost;

        location / {
            proxy_pass         http://tensorboard:6006;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_read_timeout 86400;
        }
    }
}